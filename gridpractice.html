<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        background-color: brown;
        height: 500px;
        border: 2px solid black;
        display: grid;
        grid-template-columns:  30px 1fr ;
        grid-template-rows: 20px 1fr 20px ; 
        gap: 10px;

    }
    .div{
        background-color: aqua;
        border: 2px solid black;
    }
    #box1{
        grid-column-start: 1;
        grid-column-end: 3;
    }
    #box4{
        grid-column-start: 1;
        grid-column-end: 3;
    }
    
</style>
<body>
    <div class="container">
        <div class="div" id="box1">box1</div>
        <div class="div" id="box2">box2</div>
        <div class="div" id="box3">box3</div>
        <div class="div" id="box4">box4</div>
    </div>
</body>
</html>
