<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
       
    }
.contain{
    background-color: antiquewhite;
     display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;

}
.box{
    width: 780px;
    height: 450px;
     display: flex;
     border-radius: 20px;
     overflow: hidden;
}
.left{
    width: 45%;
    height: 100%;
    background-image: url("new-admin-ajax.webp");
    background-size: cover;
   
    background-position: center;
}

.right{
    width: 55%;
    background-color: white;
     
}

#hic{
    letter-spacing: 4px;
    margin-left: 15px;
    font-size: 15px;
    margin-top: 15px;
    color: gray;
    font-family: Arial, Helvetica, sans-serif;
    

}
#mug{
    margin-left: 15px;
    margin-top: 15px;
    font-size:45px;
}
#para{
    margin-left: 15px;
    font-size: 15px;
    font-family: Arial, Helvetica, sans-serif;
    color: gray;
    margin-top: 2px;
}
.text{
    display: flex;
    gap: 18px;
    margin-top: 13px;
     align-items: baseline;
}
#hihi{
    margin-left: 15px;
    color: green;
    font-size:30px;
    display: inline-block;
    margin-top: 9px;
}
#hih{
    display: inline-block;
    margin-top: 15px;
    text-decoration: line-through;
    color: gray;
   
}
#btn{
    border: none;
    margin-top: 30px;
    margin-left: 30px;
    width: 350px;
    height: 50px;
    background-color: green;
    color: white;
    word-spacing: 2px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 15px;
    border-radius:7px;
    cursor: pointer;
    font-weight: bold;
}


</style>
<body>
    <div class="contain">
        <div class="box">
                <div class="left">
                </div>
                <div class="right">
                <p id="hic"> COFFEE MUG</p>
                <h1 id="mug"> White Coffee<br> Mug</h1>
                <br>
                <p id="para"> Coffee Mugs are designed to express <br>emotions. These are acclaimed for their<br> amazing designs & superior quality.</p>
                <div class="text">
                    <h3 id="hihi"> $149</h3>
                    <p id="hih"> $200</p>
                </div>
                <button id="btn">🛒 Add To Cart</button>

                </div>
          

        </div>
    </div>
</body>
</html>
